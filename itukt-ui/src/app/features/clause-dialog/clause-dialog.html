<h2 mat-dialog-title>Klausul</h2>
<mat-dialog-content>
  <mat-list class="info-list">
    <clause-field label="Kode">{{ clause.name }}</clause-field>
    <mat-divider />
    <clause-field label="Klausulbetingelse">
      <code class="dsl" [innerHTML]="(clause.dsl | dslHighlight)"></code>
    </clause-field>
    <mat-divider />
    <clause-field label="Fejlbesked">{{ clause.error }}</clause-field>
    @if (clause.validFrom) {
    <mat-divider />
    <clause-field label="Gyldig fra">
      {{ clause.validFrom | date:'dd-MM-yyyy HH:mm' }}
    </clause-field>
    }
  </mat-list>
</mat-dialog-content>
