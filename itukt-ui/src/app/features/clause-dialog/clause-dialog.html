<h2 mat-dialog-title>Klausul {{status == "DRAFT" ? "kladde" : ""}}</h2>
<mat-dialog-content>
  <mat-list>
    @if (editMode) {
    <clause-edit-items [clause]="clause" />
    } @else {
    <clause-read-items [clause]="clause" />
    }
  </mat-list>
</mat-dialog-content>

@if (status == "ACTIVE" || status == "INACTIVE") {
<mat-dialog-actions>
  @if (editMode) {
  <button matButton (click)="cancelEditMode()" [disabled]="saving">Fortryd</button>
  <button matButton (click)="save()" [disabled]="saving || editItems?.form?.invalid">
    Opret kladde
    @if (saving) {
    <div class="spinner">
      <mat-spinner [diameter]="30"></mat-spinner>
    </div>
    }
  </button>
  } @else {
  <button matButton (click)="status == 'ACTIVE' ? inactivate() : activate()" [disabled]="saving">
    {{status == "ACTIVE" ? "Inaktivér" : "Aktivér"}}
  </button>
  <span [matTooltip]="draftAlreadyExists() ? 'Der findes allerede en kladde for denne klausul' : undefined">
    <button matButton (click)="enterEditMode()" [disabled]="draftAlreadyExists()" cdkFocusInitial>Rediger</button>
  </span>
  }
</mat-dialog-actions>
}

@if (status == "DRAFT") {
<mat-dialog-actions>
  <button matButton (click)="approve()" [disabled]="saving">
    Godkend
    @if (saving) {
    <div class="spinner">
      <mat-spinner [diameter]="30"></mat-spinner>
    </div>
    }
  </button>
</mat-dialog-actions>
}
