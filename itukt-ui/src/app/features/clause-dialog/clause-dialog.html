<h2 mat-dialog-title>Klausul {{clause.status == "DRAFT" ? "kladde" : ""}}</h2>
<mat-dialog-content class="clause-dialog-content">


	@if (clause.status === 'DRAFT') {
	<clause-info [clause]="clause" />
	} 
	@else {
	<mat-tab-group [dynamicHeight]="true" animationDuration="0ms">
		<mat-tab label="Detaljer">
			<div class="tab-content">
				<clause-info [clause]="clause" />
			</div>
		</mat-tab>
		<mat-tab label="Historik">
			<div class="tab-content">
				<clause-history class="tab-content" [name]="clause.name"></clause-history>
			</div>
		</mat-tab>
	</mat-tab-group>
	}

</mat-dialog-content>
