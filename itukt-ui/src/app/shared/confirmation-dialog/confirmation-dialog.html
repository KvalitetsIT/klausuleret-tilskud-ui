<h2 mat-dialog-title>{{title}}</h2>
<mat-dialog-content>
  @if (isTemplate(content)) {
    <ng-container 
      [ngTemplateOutlet]="content" >
    </ng-container>
  } @else {
    {{ content }}
  }
</mat-dialog-content>


<mat-dialog-actions>
  <button matButton (click)="cancel()" [disabled]="saving">
    Fortryd
  </button>
  <button matButton (click)="confirm()" [disabled]="saving" cdkFocusInitial>
    {{confirmBtnTxt}}
    @if (saving) {
    <div class="button-spinner">
      <mat-spinner [diameter]="30"></mat-spinner>
    </div>
    }
  </button>
</mat-dialog-actions>
